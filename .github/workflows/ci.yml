name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linter
        run: pip install ruff
      - name: Run lint
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  docker_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t l3-ci-app:${{ github.sha }} .
  deploy_preview:
    runs-on: ubuntu-latest
    needs: [lint, test, docker_build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Simulate deploy
        run: echo "Deploying commit ${{ github.sha }} to preview environment"